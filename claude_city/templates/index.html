<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude City</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand fw-bold">Claude City</span>
      <span class="badge {{ badge_class }} fs-6">Credentials sourced via: {{ source_label }}</span>
    </div>
  </nav>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8">

        <div class="card shadow mb-4">
          <div class="card-body text-center py-5">
            <h1 class="display-4 fw-bold">{{ city.name }}</h1>
            <p class="lead text-muted">{{ city.country }} &nbsp;&middot;&nbsp; Population: {{ city.population }}</p>
          </div>
        </div>

        <div class="card shadow">
          <div class="card-header bg-dark text-white">
            <strong>Credential Details</strong>
          </div>
          <table class="table table-striped mb-0">
            <tbody>
              <tr>
                <th scope="row" class="w-25">Host</th>
                <td><code>{{ db_host }}</code></td>
              </tr>
              <tr>
                <th scope="row">Username</th>
                <td><code>{{ db_user }}</code></td>
              </tr>
              <tr>
                <th scope="row">Password</th>
                <td><code>{{ db_pass }}</code></td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="text-center mt-3">
          <a href="/" class="btn btn-outline-secondary btn-sm">Load another city</a>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
